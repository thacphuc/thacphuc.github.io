<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Diem Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to bottom, #eef7fb, #d6ecf8);
            text-align: center;
            padding: 40px;
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ✨ Hiệu ứng chữ phát sáng */
        h1 { 
            color: #4fa3d1; 
            text-shadow: 0 0 15px rgba(127, 200, 248, 0.6);
            margin-bottom: 5px;
        }
        h2 { 
            color: #7fc8f8; 
            letter-spacing: 1px;
        }

        .box {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px); /* Làm mờ nhẹ nền box cho sang */
            padding: 25px;
            margin: 25px auto;
            width: 60%;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: all 0.4s ease;
            max-width: 700px;
            position: relative;
            z-index: 10;
        }

        .box:hover { 
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(79, 163, 209, 0.2);
        }

        .avatar {
            width: 130px; height: 130px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .section-img {
            width: 90%; max-height: 200px;
            object-fit: cover; border-radius: 15px;
            margin-bottom: 15px;
        }

        .skills { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .skill {
            background: #e1f2fb; padding: 8px 18px;
            border-radius: 20px; font-size: 14px; 
            transition: 0.3s; color: #4fa3d1;
            border: 1px solid transparent;
        }
        .skill:hover { 
            background: #7fc8f8; color: white;
            transform: scale(1.1); border-color: #fff;
        }

        /* 💿 Đĩa than xoay + đập theo nhạc */
        .vinyl {
            position: fixed; bottom: -100px; right: -100px;
            width: 400px; opacity: 0.5;
            z-index: 0; pointer-events: none;
            /* Animation xoay mặc định */
            animation: spin 20s linear infinite;
        }

        /* Class này sẽ được thêm bằng JS khi nhạc chạy */
        .vinyl.playing {
            animation: spin 20s linear infinite, pulse 1.5s ease-in-out infinite;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse {
            0%, 100% { scale: 1; }
            50% { scale: 1.08; opacity: 0.7; }
        }

        /* 🎵 Nốt nhạc */
        .note {
            position: fixed; color: #7fc8f8;
            pointer-events: none; z-index: 1;
            user-select: none;
        }

        .fall-animation { animation: floatDown linear forwards; }
        .click-animation { animation: floatClick 1.5s ease-out forwards; }

        @keyframes floatDown {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            15% { opacity: 0.6; }
            85% { opacity: 0.6; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        @keyframes floatClick {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            30% { opacity: 1; transform: translate(-50%, -80%) scale(1.3); }
            100% { transform: translate(-50%, -180px) rotate(90deg) scale(0.8); opacity: 0; }
        }

        .sparkle {
            position: fixed; width: 6px; height: 6px;
            background: #7fc8f8; border-radius: 50%;
            pointer-events: none; animation: fade 0.8s linear forwards;
            z-index: 9999;
        }
        @keyframes fade { to {opacity: 0; transform: scale(2.5);} }
    </style>
</head>
<body>

<img src="tải xuống (21).jpg" class="avatar" alt="Avatar">
<h1>hi, i'm diem ✨</h1>
<p>just a second-year student figuring things out… but in a cute way 🌷</p>

<div class="box">
    <img src="https://i.imgur.com/2DhmtJ4.jpg" class="section-img">
    <h2>about me</h2>
    <p><b>Lương Kiều Diễm</b></p>
    <p>Second-year Accounting & Auditing student at FTU</p>
    <p>I enjoy creating things and romanticizing my daily life ✨</p>
</div>

<audio id="music" loop>
    <source src="https://files.catbox.moe/af2dx6.mp3" type="audio/mpeg">
</audio>
<img src="suki chan hai.jpg" id="vinylDisk" class="vinyl">

<script>
    const notesList = ["🎵", "🎶", "🎼", "♩", "♪", "♫", "♬"];
    const music = document.getElementById("music");
    const vinyl = document.getElementById("vinylDisk");

    // 1. Sparkle khi di chuột
    document.addEventListener("mousemove", (e) => {
        let sparkle = document.createElement("div");
        sparkle.className = "sparkle";
        sparkle.style.left = e.clientX + "px";
        sparkle.style.top = e.clientY + "px";
        document.body.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 800);
    });

    // 2. Click chuột: Phát nhạc + Hiện nốt nhạc + Đĩa than đập
    document.addEventListener("click", (e) => {
        if (music.paused) {
            music.play().catch(() => {});
            vinyl.classList.add("playing"); // Thêm hiệu ứng đập cho đĩa
        }
        createNote(e.clientX, e.clientY, true);
    });

    function createNote(x = null, y = null, isClick = false) {
        const note = document.createElement("div");
        const size = isClick ? Math.random() * 20 + 40 : Math.random() * 25 + 25;
        
        note.className = "note " + (isClick ? "click-animation" : "fall-animation");
        note.innerHTML = notesList[Math.floor(Math.random() * notesList.length)];
        note.style.fontSize = size + "px";

        if (isClick) {
            note.style.left = x + "px";
            note.style.top = y + "px";
        } else {
            note.style.left = Math.random() * 100 + "vw";
            note.style.top = "-60px";
            note.style.animationDuration = (Math.random() * 4 + 8) + "s";
            note.style.opacity = Math.random() * 0.4 + 0.3;
        }

        document.body.appendChild(note);
        setTimeout(() => note.remove(), isClick ? 1500 : 12000);
    }

    // 3. Tự động rơi nốt nhạc
    setInterval(() => createNote(), 1500);
</script>
</body>
</html>
