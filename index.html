<!DOCTYPE html>
<html>
<head>
    <title>Diem Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to bottom, #eef7fb, #d6ecf8);
            text-align: center;
            padding: 40px;
            margin: 0;
            overflow-x: hidden; /* Tránh bị thanh cuộn ngang */
        }

        h1 { color: #4fa3d1; }
        h2 { color: #7fc8f8; }

        .box {
            background: white;
            padding: 25px;
            margin: 25px auto;
            width: 60%;
            border-radius: 20px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
            transition: 0.3s;
            max-width: 700px;
            position: relative;
            z-index: 10;
        }

        .box:hover { transform: translateY(-8px); }

        .avatar {
            width: 130px; height: 130px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #d6ecf8;
        }

        .section-img {
            width: 80%; max-height: 180px;
            object-fit: cover; border-radius: 15px;
            margin-bottom: 15px;
        }

        .skills { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .skill {
            background: #a8d8f0; padding: 8px 15px;
            border-radius: 20px; font-size: 14px; transition: 0.3s;
        }
        .skill:hover { background: #7fc8f8; transform: scale(1.1); }

        .vinyl {
            position: fixed; bottom: -80px; right: -80px;
            width: 450px; opacity: 0.4;
            animation: spin 25s linear infinite;
            z-index: 0; pointer-events: none;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 🎵 CSS cho nốt nhạc */
        .note {
            position: fixed;
            color: #7fc8f8;
            pointer-events: none;
            z-index: 1;
            text-rendering: optimizeLegibility;
        }

        /* Hiệu ứng rơi tự động */
        .fall-animation {
            animation: floatDown linear forwards;
        }

        /* Hiệu ứng khi click */
        .click-animation {
            animation: floatClick 2s ease-out forwards;
        }

        @keyframes floatDown {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        @keyframes floatClick {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            20% { opacity: 1; transform: translate(-50%, -80%) scale(1.2); }
            100% { transform: translate(-50%, -200px) rotate(45deg) scale(1); opacity: 0; }
        }

        .sparkle {
            position: fixed; width: 8px; height: 8px;
            background: #7fc8f8; border-radius: 50%;
            pointer-events: none; animation: fade 1s linear forwards;
            z-index: 9999;
        }
        @keyframes fade { to {opacity: 0; transform: scale(2);} }
    </style>
</head>
<body>

<img src="tải xuống (21).jpg" class="avatar">
<h1>hi, i'm diem ✨</h1>
<p>just a second-year student figuring things out… but in a cute way 🌷</p>

<div class="box">
    <img src="https://i.imgur.com/2DhmtJ4.jpg" class="section-img">
    <h2>about me</h2>
    <p><b>Lương Kiều Diễm</b></p>
    <p>Second-year Accounting & Auditing student at FTU</p>
    <p>I enjoy creating things and romanticizing my daily life ✨</p>
</div>

<div class="box">
    <img src="https://i.imgur.com/Yk6Y5bR.jpg" class="section-img">
    <h2>skills</h2>
    <div class="skills">
        <div class="skill">Excel</div>
        <div class="skill">SQL</div>
        <div class="skill">Financial Analysis</div>
        <div class="skill">Presentation</div>
        <div class="skill">Canva</div>
        <div class="skill">Surviving deadlines</div>
    </div>
</div>

<audio id="music" loop>
    <source src="https://files.catbox.moe/af2dx6.mp3" type="audio/mpeg">
</audio>
<img src="suki chan hai.jpg" class="vinyl">

<script>
    // 1. Sparkle khi di chuột
    document.addEventListener("mousemove", function(e) {
        let sparkle = document.createElement("div");
        sparkle.className = "sparkle";
        sparkle.style.left = e.clientX + "px";
        sparkle.style.top = e.clientY + "px";
        document.body.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 1000);
    });

    // 2. Nhạc và Click
    const notesList = ["🎵", "🎶", "🎼", "♩", "♪", "♫", "♬"];
    const music = document.getElementById("music");

    document.addEventListener("click", function(e) {
        // Bật nhạc lần đầu click
        music.play().catch(() => {}); 
        
        // Tạo nốt nhạc tại vị trí click
        createNote(e.clientX, e.clientY, true);
    });

    function createNote(x = null, y = null, isClick = false) {
        const note = document.createElement("div");
        note.className = "note " + (isClick ? "click-animation" : "fall-animation");
        note.innerHTML = notesList[Math.floor(Math.random() * notesList.length)];

        // Kích thước to hơn (30px - 60px)
        const size = Math.random() * 30 + 30;
        note.style.fontSize = size + "px";

        if (isClick) {
            note.style.left = x + "px";
            note.style.top = y + "px";
        } else {
            note.style.left = Math.random() * 100 + "vw";
            note.style.top = "-50px";
            note.style.animationDuration = (Math.random() * 5 + 7) + "s"; // Rơi chậm (7-12s)
        }

        document.body.appendChild(note);
        setTimeout(() => note.remove(), isClick ? 2000 : 12000);
    }

    // 3. Tự động rơi (mật độ thưa: mỗi 1.2 giây một nốt)
    setInterval(() => createNote(), 1200);
</script>
</body>
</html>
